app = "your-voltagent-app"

primary_region = "sin"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3141"

[http_service]
  internal_port = 3141
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024